name: llama-gemma
services:
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.flexible
    container_name: llama-server-flex-gemma
    ports:
      - "8080:8080"
    volumes:
      - ${HOME:-$HOME}/models:/root/models
    env_file:
      - .env.gemma
    working_dir: /root/llama-cpp-turboquant
    environment:
      LLAMA_ARG_MODEL: ${MODEL_DIR}/${MODEL_FILE:-gemma-4-19B-A4B-it-The-DECKARD-Heretic-Uncensored-Thinking.IQ4_XS.gguf}
      LLAMA_ARG_CTX_SIZE: ${N_CTX:-256144}
      LLAMA_ARG_N_GPU_LAYERS: ${N_GPU_LAYERS:-99}
      LLAMA_ARG_THREADS: ${N_THREADS:-6}
      LLAMA_ARG_N_CPU_MOE: ${N_CPU_MOE:-36}
      LLAMA_ARG_CACHE_TYPE_K: ${CACHE_TYPE_K:-q8_0}
      LLAMA_ARG_CACHE_TYPE_V: ${CACHE_TYPE_V:-q8_0}
      LLAMA_ARG_K_CACHE_HADAMARD: ${K_CACHE_HADAMARD:-true}
      LLAMA_ARG_V_CACHE_HADAMARD: ${V_CACHE_HADAMARD:-true}
      LLAMA_ARG_FLASH_ATTN: ${FLASH_ATTN:-true}
      LLAMA_ARG_ROPE_SCALING_TYPE: ${ROPE_SCALING:-yarn}
      LLAMA_ARG_ROPE_SCALE: ${ROPE_SCALE:-8.0}
      LLAMA_ARG_NO_MMAP: ${NO_MMAP:-true}
      LLAMA_ARG_FIT: ${FIT:-true}
      LLAMA_ARG_MLOCK: ${MLOCK:-true}
      LLAMA_ARG_JINJA: ${JINJA:-true}
      LLAMA_ARG_NO_WARMUP: ${NO_WARMUP:-true}
      LLAMA_ARG_SPEC_TYPE: ${SPEC_TYPE}
      LLAMA_ARG_SPEC_DRAFT_NGL: ${SPEC_DRAFT_NGL:-all}
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: 8080
    ulimits:
      memlock:
        soft: -1
        hard: -1
    cap_add:
      - IPC_LOCK
    command: ["/root/ik_llama-cpp/build/bin/llama-server"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
