name: llama-bee
services:
  llama_pg:
    build:
      context: .
      dockerfile: Dockerfile.bee
    container_name: llama-beellama-server
    ports:
      - "8080:8080"
    volumes:
      - ${HOME}/models:/root/models
    env_file:
      - .env.bee
    working_dir: /root/beellama
    environment:
      - MODEL_DIR=/root/models
      - MODEL_FILE=${MODEL_FILE:-Huihui-Qwen3.6-35B-A3B-abliterated.Q4_K_M.gguf}
      - N_CTX=${N_CTX:-256144}
      - N_GPU_LAYERS=${N_GPU_LAYERS:-99}
      - N_THREADS=${N_THREADS:-6}
      - MODEL_PATH=${MODEL_DIR}/${MODEL_FILE}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    cap_add:
      - IPC_LOCK
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - /bin/sh
      - -c
      - |
        MODEL_PATH="$${MODEL_DIR}/$${MODEL_FILE}"
        echo "Starting beellama-server with model: $${MODEL_PATH}"
        ./build/bin/llama-server \
          -m "$${MODEL_PATH}" \
          --cache-type-k turbo3_tcq \
          --cache-type-v turbo3_tcq \
          --flash-attn on \
          --rope-scaling yarn \
          --rope-scale 8.0 \
          -c $${N_CTX} \
          --n-gpu-layers $${N_GPU_LAYERS} \
          --host 0.0.0.0 \
          --port 8080 \
          --no-mmap \
          --n-cpu-moe 36 \
          --mlock \
          --jinja \
          --no-warmup \
          -t $${N_THREADS}
