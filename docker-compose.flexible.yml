# Flexible docker-compose — fully env-driven, no download logic.
# All configuration comes from .env / environment variables.
# Models are expected to be volume-mounted at /root/models.

services:
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.flexible
    container_name: llama-server
    ports:
      - "8080:8080"
    volumes:
      - ${HOME}/models:/root/models
    working_dir: /root/llama-cpp-turboquant
    environment:
      # Model (overridable via .env)
      - MODEL_FILE=${MODEL_FILE:-Qwen3.6-35B-A3B-UD-Q4_K_M.gguf}
      - MODEL_DIR=${MODEL_DIR:-/root/models}
      - MODEL_PATH=${MODEL_DIR}/${MODEL_FILE}
      - DRAFT_MODEL_FILE=${DRAFT_MODEL_FILE:-dflash-draft-3.6-q4_k_m.gguf}

      # Performance (overridable via .env)
      - N_CTX=${N_CTX:-256000}
      - N_GPU_LAYERS=${N_GPU_LAYERS:-99}
      - N_THREADS=${N_THREADS:-6}
      - N_CPU_MOE=${N_CPU_MOE:-36}

      # Cache / attention (overridable via .env)
      - CACHE_TYPE_K=${CACHE_TYPE_K:-turbo3_tcq}
      - CACHE_TYPE_V=${CACHE_TYPE_V:-turbo3_tcq}
      - FLASH_ATTN=${FLASH_ATTN:-on}

      # Rope (overridable via .env)
      - ROPE_SCALING=${ROPE_SCALING:-yarn}
      - ROPE_SCALE=${ROPE_SCALE:-8.0}

      # Runtime flags (overridable via .env)
      - NO_MMAP=${NO_MMAP:-true}
      - MLOCK=${MLOCK:-true}
      - JINJA=${JINJA:-true}
      - NO_WARMUP=${NO_WARMUP:-true}

      # Speculative decoding (overridable via .env)
      - SPEC_TYPE=${SPEC_TYPE:-dflash}
      - SPEC_DRAFT_NGL=${SPEC_DRAFT_NGL:-all}

    ulimits:
      memlock:
        soft: -1
        hard: -1
    cap_add:
      - IPC_LOCK
    command:
      - /bin/sh
      - -c
      - |
        MODEL_FILE="${MODEL_FILE:-Qwen3.6-35B-A3B-UD-Q4_K_M.gguf}"
        MODEL_DIR="${MODEL_DIR:-/root/models}"
        DRAFT_MODEL_FILE="${DRAFT_MODEL_FILE:-dflash-draft-3.6-q4_k_m.gguf}"

        # ── Resolve model path (volume mount first, then custom) ───────────────
        if [ -f "/root/models/snapshots/a483e9e6cbd595906af30beda3187c2663a1118c/$MODEL_FILE" ]; then
          MODEL_PATH="/root/models/snapshots/a483e9e6cbd595906af30beda3187c2663a1118c/$MODEL_FILE"
        elif [ -f "$MODEL_DIR/$MODEL_FILE" ]; then
          MODEL_PATH="$MODEL_DIR/$MODEL_FILE"
        else
          echo "Model not found at either:"
          echo "  /root/models/snapshots/a483e9e6cbd595906af30beda3187c2663a1118c/$MODEL_FILE"
          echo "  $MODEL_DIR/$MODEL_FILE"
          exit 1
        fi

        # ── Check for draft model ──────────────────────────────────────────────
        DRAFT_MODEL_PATH=""
        if [ -f "$MODEL_DIR/$DRAFT_MODEL_FILE" ]; then
          DRAFT_MODEL_PATH="$MODEL_DIR/$DRAFT_MODEL_FILE"
        fi

        # ── Build flags from env ───────────────────────────────────────────────
        NO_MMAP_FLAG=""
        if [ "$NO_MMAP" = "true" ]; then NO_MMAP_FLAG="--no-mmap"; fi
        MLOCK_FLAG=""
        if [ "$MLOCK" = "true" ]; then MLOCK_FLAG="--mlock"; fi
        JINJA_FLAG=""
        if [ "$JINJA" = "true" ]; then JINJA_FLAG="--jinja"; fi
        NO_WARMUP_FLAG=""
        if [ "$NO_WARMUP" = "true" ]; then NO_WARMUP_FLAG="--no-warmup"; fi

        # ── Launch llama-server (single command, fully env-driven) ─────────────
        echo "MODEL_FILE: $MODEL_FILE"
        echo "MODEL_PATH: $MODEL_PATH"
        echo "DRAFT_MODEL_PATH: $DRAFT_MODEL_PATH"
        echo "N_CTX: $N_CTX | N_GPU_LAYERS: $N_GPU_LAYERS | N_THREADS: $N_THREADS"
        echo "CACHE_TYPE_K: $CACHE_TYPE_K | CACHE_TYPE_V: $CACHE_TYPE_V"

        /root/llama-cpp-turboquant/build/bin/llama-server \
          -m "$MODEL_PATH" \
          --spec-type "$SPEC_TYPE" \
          --spec-draft-model "$DRAFT_MODEL_PATH" \
          --spec-draft-ngl "$SPEC_DRAFT_NGL" \
          --cache-type-k "$CACHE_TYPE_K" \
          --cache-type-v "$CACHE_TYPE_V" \
          --flash-attn "$FLASH_ATTN" \
          --rope-scaling "$ROPE_SCALING" \
          --rope-scale "$ROPE_SCALE" \
          -c "$N_CTX" \
          --n-gpu-layers "$N_GPU_LAYERS" \
          --n-cpu-moe "$N_CPU_MOE" \
          --host 0.0.0.0 \
          --port 8080 \
          $NO_MMAP_FLAG \
          $MLOCK_FLAG \
          $JINJA_FLAG \
          $NO_WARMUP_FLAG \
          -t "$N_THREADS"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
